function renderSeatTypeList() {
  const types = getSeatTypes();
  if(types.length === 0) return '<div class="list-item"><div style="font-size:13px;color:var(--text3);">No seat types. Add one below.</div></div>';
  return types.map((t, i) => `
    <div class="list-item">
      <div class="list-item-main">
        <div class="list-item-title">${t}</div>
        <div class="list-item-sub">${state.seats.filter(s=>s.type===t).length} seat(s) using this type</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="openSeatTypeForm(${i})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSeatType(${i})">🗑</button>
      </div>
    </div>`).join('');
}

function openSeatTypeForm(index = null) {
  const types = getSeatTypes();
  const current = index !== null ? types[index] : '';
  closeDrawer();
  setTimeout(() => {
    openDrawer(`
      <div class="drawer-title">${index !== null ? '✏ Edit Seat Type' : '➕ Add Seat Type'}</div>
      <div class="form-group">
        <label class="form-label">Type Name</label>
        <input class="form-input" id="st-name" value="${current}" placeholder="e.g. Standing Desk"/>
      </div>
      ${index !== null && state.seats.some(s=>s.type===current) ? `
        <div class="info-box warn" style="margin-bottom:4px;">⚠ ${state.seats.filter(s=>s.type===current).length} seat(s) use this type. Renaming will update them.</div>
      ` : ''}
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
        <button class="btn btn-primary btn-full" onclick="saveSeatType(${index})">Save</button>
        <button class="btn btn-secondary btn-full" onclick="closeDrawer()">Cancel</button>
      </div>
    `);
    setTimeout(() => document.getElementById('st-name')?.focus(), 300);
  }, 200);
}

function saveSeatType(index) {
  const name = document.getElementById('st-name')?.value?.trim();
  if (!name) { alert('Please enter a type name.'); return; }
  const types = getSeatTypes();
  if (index !== null) {
    const oldName = types[index];
    types[index] = name;
    // Update any seats using the old type name
    state.seats = state.seats.map(s => s.type === oldName ? {...s, type: name} : s);
    save();
  } else {
    if (types.includes(name)) { alert('This type already exists.'); return; }
    types.push(name);
  }
  saveSeatTypes(types);
  closeDrawer();
  renderSettings();
}

function deleteSeatType(index) {
  const types = getSeatTypes();
  const name = types[index];
  const inUse = state.seats.filter(s => s.type === name).length;
  if (inUse > 0) {
    alert(`Cannot delete "${name}" — ${inUse} seat(s) are using this type. Reassign them first.`);
    return;
  }
  if (!confirm(`Delete seat type "${name}"?`)) return;
  types.splice(index, 1);
  saveSeatTypes(types);
  renderSettings();
}


function openPaymentTypeForm(paymentId=null) {
  const pt = paymentId ? state.paymentTypes.find(p=>p.id===paymentId) : null;
  openDrawer(`
    <div class="drawer-title">${pt?'Edit':'Add'} Payment Method</div>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="pt-name" value="${pt?.name||''}"/></div>

      <button class="btn btn-primary" style="flex:1;" onclick="savePaymentType('${paymentId||''}')">Save</button>

}
function savePaymentType(paymentId) {
  const name = document.getElementById('pt-name').value.trim();
  if (!name) { alert('Enter a name.'); return; }
  if (paymentId) {
    state.paymentTypes = state.paymentTypes.map(pt=>pt.id===paymentId?{...pt,name}:pt);
  } else {
    state.paymentTypes.push({id:uid(),name,isActive:true});
  }
  savePaymentTypes(state.paymentTypes);
  renderSettings();
  closeDrawer();
}
function togglePaymentType(id) {
  state.paymentTypes = state.paymentTypes.map(pt=>pt.id===id?{...pt,isActive:!pt.isActive}:pt);
  savePaymentTypes(state.paymentTypes);
  renderSettings();
}

      ${seat.session?`

        <div class="receipt-row"><span class="lbl">Elapsed</span><span class="val" data-timer-seat="${seat.id}">${fmtTime(elapsed)}</span></div>

function openStartSession(seatId) {
  const seat = state.seats.find(s=>s.id===seatId);
  if(!seat) return;
  const pool = getVoucherPool(seat.type);
  const available = pool ? pool.vouchers.filter(v=>v.status==='available').length : 0;
  const hasPool = !!pool;
  const lowStock = hasPool && available <= 20 && available > 0;
  const noStock = hasPool && available === 0;

  closeDrawer();
  setTimeout(()=>{
    openDrawer(`

function setSessionType(type) {
  document.getElementById('stype-open').classList.toggle('active', type==='open');
  document.getElementById('stype-timed').classList.toggle('active', type==='timed');
  document.getElementById('timed-section').style.display = type==='timed' ? '' : 'none';
}

function doStartSession(seatId) {
  const name = document.getElementById('start-user')?.value?.trim();
  if(!name){document.getElementById('start-user')?.focus();return;}
  const isTimed = document.getElementById('stype-timed')?.classList.contains('active');
  let limitMs = null;
  if(isTimed){
    const hrs = parseInt(document.getElementById('limit-hrs')?.value)||0;
    const min = parseInt(document.getElementById('limit-min')?.value)||0;
    const totalMin = hrs*60 + min;
    if(totalMin < 1){alert('Please set at least 1 minute.');return;}
    limitMs = totalMin * 60 * 1000;
  }

  // ── Voucher Assignment ──
  const seat = state.seats.find(s=>s.id===seatId);
  let assignedVoucher = null;
  const manualInput = document.getElementById('manual-voucher');
  if(manualInput && manualInput.value.trim()) {
    // Manual entry fallback
    assignedVoucher = manualInput.value.trim().toUpperCase();
  } else {
    // Auto-assign from pool
    assignedVoucher = assignVoucherFromPool(seat.type, limitMs);
  }

  const session = {id:uid(), user:name, startTime:Date.now()};
  if(limitMs) session.limitMs = limitMs;
  if(assignedVoucher) session.wifiVoucher = assignedVoucher;

  state.seats = state.seats.map(s=>s.id===seatId?{...s,status:'occupied',session}:s);
  save();
  updateVoucherBadge();
  closeDrawer();

  // Show voucher popup if assigned
  if(assignedVoucher) {
    setTimeout(()=>showVoucherAssigned(seat, assignedVoucher, limitMs), 300);
  } else {
    renderScreen(state.currentScreen);
  }
}

function confirmEndSession(seatId) {
  const seat = state.seats.find(s=>s.id===seatId);
  if(!seat||!seat.session) return;
  const rate = getRate(seat.rateId);
  const elapsed = (_now - seat.session.startTime)/1000;
  const bill = calcBill(seat, _now);
  const isTimed = !!seat.session.limitMs;

  const billedSec = isTimed
    ? Math.min(elapsed, seat.session.limitMs/1000)
    : elapsed;
  closeDrawer();

        <button class="btn btn-secondary btn-full" onclick="closeDrawer()">Cancel</button>

    `);

function doEndSession(seatId) {
  const seat = state.seats.find(s=>s.id===seatId);
  if(!seat||!seat.session) return;
  const rate = getRate(seat.rateId);
  const endTime = Date.now();
  // For timed sessions: actual elapsed, but bill capped at limit duration
  const actualElapsed = (endTime - seat.session.startTime)/1000/3600;
  const elapsed = seat.session.limitMs
    ? Math.min(actualElapsed, seat.session.limitMs/1000/3600)
    : actualElapsed;
  const bill = Math.max(rate.minCharge, elapsed * rate.perHour);
  openPaymentSelection(seatId, seat, rate, bill, endTime, elapsed);
}

function updateDiscount(original) {
  const type = document.getElementById('discount-type').value;
  const val = parseFloat(document.getElementById('discount-value').value)||0;
  document.getElementById('discount-value').disabled = type==='none';
  let disc=0, final=original;
  if(type==='percentage'){disc=original*(val/100);final=original-disc;}
  else if(type==='fixed'){disc=Math.min(val,original);final=original-disc;}
  const row = document.getElementById('discount-display-row');
  if(type!=='none'&&val>0){row.style.display='flex';document.getElementById('discount-amount').textContent=`-₱${disc.toFixed(2)}`;}
  else row.style.display='none';
  document.getElementById('final-total').textContent=`₱${final.toFixed(2)}`;
  const cashInput = document.getElementById('amount-received');
  if(cashInput){cashInput.min=final;calculateChange();}
}

function selectPaymentType(paymentId, bill) {
  document.querySelectorAll('.payment-option').forEach(el=>el.classList.remove('selected'));
  document.querySelector(`[data-payment-id="${paymentId}"]`).classList.add('selected');
  const cashSec = document.getElementById('cash-input-section');
  if(paymentId==='cash'){
    cashSec.style.display='block';
    const finalStr = document.getElementById('final-total').textContent.replace(/[^0-9.]/g,'');
    document.getElementById('amount-received').value=parseFloat(finalStr).toFixed(2);
    calculateChange();
    document.getElementById('amount-received').focus();
  } else {
    cashSec.style.display='none';
  }
  document.getElementById('pay-btn').disabled=false;
}

function calculateChange() {
  const received = parseFloat(document.getElementById('amount-received').value)||0;
  const finalStr = document.getElementById('final-total').textContent.replace(/[^0-9.]/g,'');
  const final = parseFloat(finalStr)||0;
  const change = received - final;
  const el = document.getElementById('change-amount');
  if(change>=0){el.textContent=`₱${change.toFixed(2)}`;el.style.color='var(--accent)';}
  else{el.textContent=`(₱${Math.abs(change).toFixed(2)} short)`;el.style.color='var(--red)';}
}

function processPayment(seatId, originalBill, elapsed) {
  const selected = document.querySelector('.payment-option.selected');
  if(!selected){alert('Please select a payment method');return;}
  const paymentId = selected.dataset.paymentId;
  const paymentType = state.paymentTypes.find(pt=>pt.id===paymentId);
  const discountType = document.getElementById('discount-type').value;
  const discountVal = parseFloat(document.getElementById('discount-value').value)||0;
  const finalStr = document.getElementById('final-total').textContent.replace(/[^0-9.]/g,'');
  const finalTotal = parseFloat(finalStr)||0;
  let discountAmount=0;
  if(discountType==='percentage') discountAmount=originalBill*(discountVal/100);
  else if(discountType==='fixed') discountAmount=discountVal;
  const seat = state.seats.find(s=>s.id===seatId);
  const rate = getRate(seat.rateId);
  const endTime = Date.now();
  let amountReceived=finalTotal, change=0;
  if(paymentId==='cash'){
    amountReceived=parseFloat(document.getElementById('amount-received').value)||0;
    change=amountReceived-finalTotal;
    if(amountReceived<finalTotal){alert(`Need ₱${(finalTotal-amountReceived).toFixed(2)} more.`);return;}
  }
  nextTxnNo(); // increment before building
  const record = {
    id:uid(),seatId,seatName:seat.name,seatType:seat.type,
    user:seat.session.user,startTime:seat.session.startTime,endTime,elapsed,
    receiptNo: fmtReceiptNo(endTime),
    originalBill,discountType,discountValue:discountVal,discountAmount,finalTotal,
    rateName:rate.name,ratePerHour:rate.perHour,minCharge:rate.minCharge,
    paymentType:paymentId,paymentTypeName:paymentType.name,
    amountReceived,change,
    handledBy:state.currentUser?.name||'Staff',
    wifiVoucher: seat.session.wifiVoucher || null,
  };
  pushSessionAndMarkVoucher(record);
  state.seats = state.seats.map(s=>s.id===seatId?{...s,status:'available',session:null}:s);
  save();
  closeDrawer();
  setTimeout(()=>{showReceipt(record);},250);
}

      ${rec.discountAmount>0?`<div class="receipt-row"><span class="lbl">Discount</span><span class="val" style="color:var(--accent);">-₱${rec.discountAmount.toFixed(2)}</span></div>`:''}
      <div class="receipt-row total"><span class="lbl">Total Bill</span><span class="val">₱${(rec.finalTotal||rec.bill).toFixed(2)}</span></div>

      ${rec.paymentType==='cash'?`<div class="receipt-row"><span class="lbl">Received</span><span class="val">₱${(rec.amountReceived||0).toFixed(2)}</span></div><div class="receipt-row"><span class="lbl">Change</span><span class="val">₱${(rec.change||0).toFixed(2)}</span></div>`:''}
      <div class="receipt-row"><span class="lbl">Staff</span><span class="val">${rec.handledBy||'System'}</span></div>
    </div>
    ${hasVoucher ? `
      <div class="voucher-code-display" style="margin-bottom:4px;">
        <div class="voucher-code-label">📶 WiFi Voucher Code</div>
        <div class="voucher-code-value">${rec.wifiVoucher}</div>

    <div style="text-align:center;font-size:12px;color:var(--text3);margin:12px 0 16px;">Thank you for using StudyHub! 📚</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${isPrinterReady()?`
        <button class="btn btn-secondary" style="flex:1;" onclick="printSessionReceipt(window._lastRec)">🖨️ Receipt</button>
        ${hasVoucher?`<button class="btn btn-secondary" style="flex:1;" onclick="printWifiSlip(window._lastRec)">📶 WiFi Slip</button>`:''}
      `:''}
      <button class="btn btn-primary" style="flex:1;" onclick="closeDrawer();renderScreen(state.currentScreen);">Done</button>
    </div>
  `);
  renderScreen(state.currentScreen);
}

function setAlertMode(mode) {
  // Update seg-btn active state immediately without full re-render
  document.querySelectorAll('#alert-mode-ctrl .seg-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['voice','beep','both'][i] === mode);
  });
  // Show/hide voice vs beep sections
  const vs = document.getElementById('voice-settings');
  const bs = document.getElementById('beep-settings');
  if(vs) vs.style.display = mode !== 'beep' ? '' : 'none';
  if(bs) bs.style.display = mode !== 'voice' ? '' : 'none';
  // Store temporarily so preview works correctly
  printerSettings._previewMode = mode;
}

function saveAlertSettings() {
  // Mode — read from seg-btn active state
  const modeBtn = document.querySelector('#alert-mode-ctrl .seg-btn.active');
  const modeMap = {'🗣️ Voice Only':'voice','🔔 Beep Only':'beep','🗣️+🔔 Both':'both'};
  const rawText  = modeBtn?.textContent?.trim() || '';
  printerSettings.alertMode = modeMap[rawText] || printerSettings._previewMode || 'voice';
  delete printerSettings._previewMode;

function previewRestore(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version || !backup.data) throw new Error('Invalid backup file format.');
      const d = backup.data;
      const preview = document.getElementById('restore-preview');
      preview.innerHTML = `
        <div class="info-box accent">
          <strong>Backup info:</strong><br>
          Exported: ${new Date(backup.exportedAt).toLocaleString('en-PH')}<br>
          Shop: ${backup.shopName||'—'}<br>
          Sessions: ${d.sessions?.length||0} · Seats: ${d.seats?.length||0} · Rates: ${d.rates?.length||0}
        </div>`;
      document.getElementById('restore-btn').disabled = false;
      window._pendingRestore = backup;
    } catch(err) {
      document.getElementById('restore-preview').innerHTML = `<div class="info-box warn">❌ ${err.message}</div>`;
      document.getElementById('restore-btn').disabled = true;
      window._pendingRestore = null;
    }
  };
  reader.readAsText(file);
}

function doRestore() {
  const backup = window._pendingRestore;
  if (!backup || !backup.data) { alert('No valid backup loaded.'); return; }
  if (!confirm('This will replace ALL current data with the backup. Continue?')) return;
  const d = backup.data;
  // Restore all data
  if (d.seats)          { state.seats = d.seats; DB.set('sh_seats', d.seats); }
  if (d.rates)          { state.rates = d.rates; DB.set('sh_rates', d.rates); }
  if (d.sessions)       { state.sessions = d.sessions; DB.set('sh_sessions', d.sessions); }
  if (d.paymentTypes)   { state.paymentTypes = d.paymentTypes; savePaymentTypes(d.paymentTypes); }
  if (d.users)          { saveUsers(d.users); renderLoginUsers(); }
  if (d.printerSettings){ Object.assign(printerSettings, d.printerSettings); savePrinterSettings(); }
  if (d.voucherPools)   { saveVoucherPools(d.voucherPools); }
  if (d.txnCounter)     { DB.set('sh_txn_counter', d.txnCounter); _txnCounter = d.txnCounter; }
  closeCenterModal();
  showToast('✅ Restore complete!');
  renderScreen(state.currentScreen);
  renderSettings();
}

function toggleResetOption(el, key) {
  el.classList.toggle('selected');
  const cb = document.getElementById('rc-'+key);
  if(cb) cb.checked = el.classList.contains('selected');
}
function toggleResetOptionCheck(key) {
  const cb = document.getElementById('rc-'+key);
  const row = document.getElementById('ro-'+key);
  if(cb&&row) row.classList.toggle('selected', cb.checked);
}

function doReset() {
  const selected = ['sessions','seats','rates','payments','counter'].filter(k=>{
    const cb = document.getElementById('rc-'+k);
    return cb && cb.checked;
  });
  if(selected.length===0){ alert('Please select at least one item to reset.'); return; }
  const labels = {sessions:'Session History',seats:'Seats',rates:'Pricing Rates',payments:'Payment Methods',counter:'Transaction Counter'};
  const listStr = selected.map(k=>labels[k]).join(', ');
  if(!confirm(`Permanently delete: ${listStr}?\n\nThis CANNOT be undone.`)) return;

  // ── Set guard flag so Firebase listeners don't push data back ──
  window._resetInProgress = true;

  if(selected.includes('sessions')) {
    // Delete from Firestore FIRST (before clearing state, so we still have the IDs)
    if(window.FirebaseDB?.configured) {
      state.sessions.forEach(s => window.FirebaseDB.remove('sessions', s.id));
    }
    state.sessions = [];
    DB.set('sh_sessions', []);
    localStorage.removeItem('sh_sessions');
  }
  if(selected.includes('seats')) {
    if(window.FirebaseDB?.configured) {
      state.seats.forEach(s => window.FirebaseDB.remove('seats', s.id));
    }
    state.seats = [];
    DB.set('sh_seats', []);
    localStorage.removeItem('sh_seats');
  }
  if(selected.includes('rates')) {
    if(window.FirebaseDB?.configured) {
      state.rates.forEach(r => window.FirebaseDB.remove('rates', r.id));
    }
    state.rates = [];
    DB.set('sh_rates', []);
    localStorage.removeItem('sh_rates');
  }
  if(selected.includes('payments')) {
    state.paymentTypes = [{id:'cash',name:'Cash',isActive:true},{id:'gcash',name:'GCash',isActive:true}];
    savePaymentTypes(state.paymentTypes);
  }
  if(selected.includes('counter')) {
    _txnCounter = 0;
    DB.set('sh_txn_counter', 0);
  }

  closeCenterModal();
  showToast(`🗑 Reset: ${listStr}`);
  renderScreen(state.currentScreen);
  renderSettings();

  // ── Release guard after 8 seconds (enough time for Firestore snapshots to settle) ──
  setTimeout(() => { window._resetInProgress = false; }, 8000);
}

  alertTimeupMsg:  'Time is up for {seat}',
  alertBeepWarningLen: 3,

});
let printerLog = [];

// ══════════════════════════════════════════════════════════════════════════════
// ALERT ENGINE  —  Voice-over (Web Speech API) + Web Audio beeps
// ══════════════════════════════════════════════════════════════════════════════
const AlertEngine = (() => {
  // Tracks which alerts have already fired per seat so they don't repeat
  const _firedWarning = new Set();
  const _firedTimeup  = new Set();

  // ── Web Audio context (lazy init) ─────────────────────────────────────────
  let _ctx = null;
  function _audioCtx() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  // ── Beep primitive ────────────────────────────────────────────────────────
  function _beep(freq, dur, delay, vol) {
    try {
      const ctx  = _audioCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.05);
    } catch(e) { console.warn('[Alert] beep error:', e); }
  }

  // ── Play N beeps spaced out ───────────────────────────────────────────────
  function _playBeeps(count, freq, beepDur) {
    const vol = (printerSettings.alertVolume ?? 90) / 100;
    const spacing = beepDur + 0.12;
    for (let i = 0; i < count; i++) _beep(freq, beepDur, i * spacing, vol);
  }

  // ── Voice-over via Web Speech API ─────────────────────────────────────────
  function _speak(text) {
    if (!window.speechSynthesis) {
      console.warn('[Alert] Web Speech API not supported in this browser.');
      return;
    }
    // Cancel any queued speech first to avoid overlap
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.volume = (printerSettings.alertVolume ?? 90) / 100;
    utter.rate   = parseFloat(printerSettings.alertRate  ?? 0.9);
    utter.pitch  = parseFloat(printerSettings.alertPitch ?? 1.0);
    utter.lang   = 'en-PH';

    // Apply selected voice if set
    const uri = printerSettings.alertVoiceURI || '';
    if (uri) {
      const voices = window.speechSynthesis.getVoices();
      const match  = voices.find(v => v.voiceURI === uri);
      if (match) utter.voice = match;
    }

    // Android Chrome workaround: re-trigger if synthesis stalls
    const resumeTimer = setInterval(() => {
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 1000);
    utter.onend   = () => clearInterval(resumeTimer);
    utter.onerror = () => clearInterval(resumeTimer);

    window.speechSynthesis.speak(utter);
  }

  // ── Build message text, replacing {seat} placeholder ─────────────────────
  function _msg(template, seatName) {
    return (template || '').replace(/\{seat\}/gi, seatName);
  }

  // ── Fire warning alert (5 min left) ──────────────────────────────────────
  function _fireWarning(seatName) {
    const mode = printerSettings.alertMode || 'voice';
    if (mode === 'voice' || mode === 'both') {
      _speak(_msg(printerSettings.alertWarningMsg || '5 minutes remaining for {seat}', seatName));
    }
    if (mode === 'beep' || mode === 'both') {
      const n    = parseInt(printerSettings.alertBeepWarningLen ?? 3);
      const freq = parseInt(printerSettings.alertBeepFreq ?? 880);
      // Beep after a short delay when combined with voice so they don't overlap
      setTimeout(() => _playBeeps(n, freq, 0.25), mode === 'both' ? 3200 : 0);
    }
  }

  // ── Fire time-up alert ────────────────────────────────────────────────────
  function _fireTimeup(seatName) {
    const mode = printerSettings.alertMode || 'voice';
    if (mode === 'voice' || mode === 'both') {
      _speak(_msg(printerSettings.alertTimeupMsg || 'Time is up for {seat}', seatName));
    }
    if (mode === 'beep' || mode === 'both') {
      const n    = parseInt(printerSettings.alertBeepTimeupLen ?? 5);
      const freq = parseInt(printerSettings.alertBeepFreq ?? 880);
      setTimeout(() => _playBeeps(n, freq, 0.18), mode === 'both' ? 3500 : 0);
    }
  }

  // ── Called every second from the clock setInterval ─────────────────────
  function tick(seats) {
    if (!printerSettings.alertEnabled) return;
    const now = Date.now();
    seats.forEach(seat => {
      if (!seat.session?.limitMs) return;
      const remainMs  = seat.session.limitMs - (now - seat.session.startTime);
      const remainSec = Math.floor(remainMs / 1000);

      // 5-minute warning — fires once when crossing below 300 s
      if (remainSec <= 300 && remainSec > 0 && !_firedWarning.has(seat.id)) {
        _firedWarning.add(seat.id);
        _fireWarning(seat.name);
      }

      // Time-up — fires once when remainMs reaches 0
      if (remainMs <= 0 && !_firedTimeup.has(seat.id)) {
        _firedTimeup.add(seat.id);
        _fireTimeup(seat.name);
      }
    });
  }

  // ── Clear tracking when a session ends (so next session fires fresh) ──────
  function clearSeat(seatId) {
    _firedWarning.delete(seatId);
    _firedTimeup.delete(seatId);
  }

  // ── Preview helpers called from Settings UI ───────────────────────────────
  function previewWarning(seatName) { _fireWarning(seatName || 'Desk 01'); }
  function previewTimeup(seatName)  { _fireTimeup(seatName  || 'Desk 01'); }

  // ── Populate voice selector with available TTS voices ─────────────────────
  function populateVoiceList(selectId) {
    const sel = document.getElementById(selectId);
    if (!sel || !window.speechSynthesis) return;
    const fill = () => {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;
      const cur = printerSettings.alertVoiceURI || '';
      sel.innerHTML =
        `<option value="">Default voice</option>` +
        voices.map(v =>
          `<option value="${v.voiceURI}" ${v.voiceURI === cur ? 'selected' : ''}>
            ${v.name} (${v.lang})
          </option>`
        ).join('');
    };
    fill();
    window.speechSynthesis.onvoiceschanged = fill;
  }

  return { tick, clearSeat, previewWarning, previewTimeup, populateVoiceList };
})();

// Windows Print Dialog: no connection needed — just open a styled popup and call window.print()
function isPrinterReady() {
  return printerSettings.platform === 'windows' && printerSettings.connMethod === 'printdialog'
    || window.printer?.isConnected;
}

function initPrinterEngine() {
  if (!window.printer) return;
  window.printer.setPaperWidth(printerSettings.paperWidth);
  window.printer.onStatus = (msg, level) => { addPrinterLog(msg, level); renderPrinterStatus(); };
  window.printer.onConnected = (type, name) => { addPrinterLog('Connected via '+type+': '+(name||''), 'success'); renderPrinterStatus(); };
  window.printer.onDisconnected = () => { addPrinterLog('Printer disconnected', 'warn'); renderPrinterStatus(); };
}

function addPrinterLog(msg, level='info') {
  const time = new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  printerLog.unshift({time, msg, level});
  if(printerLog.length>30) printerLog.pop();
  const logEl = document.getElementById('pr-log');
  if(logEl) logEl.innerHTML = printerLog.map(l=>'<div class="log-'+l.level+'">['+l.time+'] '+l.msg+'</div>').join('');
}

function renderPrinterStatus() {
  const bar = document.getElementById('pr-statusbar');
  if(!bar) return;
  const isDialogMode = printerSettings.platform === 'windows' && printerSettings.connMethod === 'printdialog';
  const escOk = window.printer?.isConnected;
  const ok = isDialogMode || escOk;
  const label = isDialogMode ? 'Windows Print Dialog · Ready' : escOk ? (window.printer.connType+' · '+(window.printer.printerName||'')) : '';
  bar.innerHTML =
    '<div class="printer-dot '+(ok?'connected':'disconnected')+'"></div>' +
    '<div style="flex:1;">' +
      '<div class="printer-status-text">'+(ok ? 'Ready · '+label : 'Not Connected')+'</div>' +
      '<div class="printer-status-sub">'+(ok ? printerSettings.paperWidth+'mm paper · Ready to print' : 'Choose your platform below')+'</div>' +
    '</div>' +
    (escOk ? '<button class="btn btn-danger btn-sm" onclick="printerDisconnect()">Disconnect</button>' : '');
}

function renderPrinterScreen() {
  const el = document.getElementById('printer-content');
  const isAndroid = printerSettings.platform === 'android';
  const isWindows = printerSettings.platform === 'windows';
  const isDialog = printerSettings.connMethod === 'printdialog';
  const isLan = printerSettings.connMethod === 'lan';
  const escOk = window.printer?.isConnected;
  const ok = isPrinterReady();

  el.innerHTML =

function setPrinterPlatform(p) {
  printerSettings.platform = p;
  printerSettings.connMethod = p === 'windows' ? 'printdialog' : 'usb';
  savePrinterSettings(); renderPrinterScreen();
}
function setPrinterConn(m) { printerSettings.connMethod = m; savePrinterSettings(); renderPrinterScreen(); }
function setPaperWidth(mm) { printerSettings.paperWidth = mm; if(window.printer) window.printer.setPaperWidth(mm); savePrinterSettings(); renderPrinterScreen(); }
function saveLanSettings() {
  printerSettings.lanIp = document.getElementById('pr-ip')?.value?.trim()||'';
  printerSettings.lanPort = parseInt(document.getElementById('pr-port')?.value)||9100;
  printerSettings.lanBridgePort = parseInt(document.getElementById('pr-bridge-port')?.value)||8765;
  savePrinterSettings(); showToast('LAN settings saved');
}
function saveReceiptSettings() {
  printerSettings.shopName = document.getElementById('pr-shop')?.value||'StudyHub';
  printerSettings.shopTagline = document.getElementById('pr-tagline')?.value||'';
  printerSettings.shopAddress = document.getElementById('pr-address')?.value||'';
  printerSettings.shopPhone = document.getElementById('pr-phone')?.value||'';
  printerSettings.footerNote = document.getElementById('pr-footer')?.value||'';
  printerSettings.receiptFont = document.getElementById('pr-font')?.value||'ibm';
  const fsVal = parseInt(document.getElementById('pr-fontsize')?.value||'10');
  printerSettings.receiptFontSize = Math.min(16,Math.max(7,fsVal)).toString();
  savePrinterSettings(); showToast('Receipt settings saved');
}

async function printerConnect() {
  addPrinterLog('Connecting ('+printerSettings.connMethod+')...');
  try {
    if(printerSettings.connMethod==='usb') await window.printer.connectUSB();
    else if(printerSettings.connMethod==='bluetooth') await window.printer.connectBluetooth();
    else if(printerSettings.connMethod==='lan') {
      if(!printerSettings.lanIp){alert('Enter the printer IP address first.');return;}
      await window.printer.connectLAN(printerSettings.lanIp, printerSettings.lanPort, printerSettings.lanBridgePort);
    }
  } catch(e) { addPrinterLog('Failed: '+e.message,'error'); alert('Connection failed:\n\n'+e.message); }
}
async function printerDisconnect() {
  if(window.printer?.isConnected) await window.printer.disconnect();
  renderPrinterScreen();
}

function openPrintWindow(html) {
  const win = window.open('', '_blank', 'width=400,height=600');
  if (!win) { alert('Pop-up blocked! Allow pop-ups for this page in your browser settings, then try again.'); return; }
  win.document.write(html);
  win.document.close();
}

async function printSessionReceipt(rec) {
  // Build duration as HH:MM:SS
  const durSec = Math.round(rec.elapsed * 3600);
  const durStr = (()=>{const h=Math.floor(durSec/3600).toString().padStart(2,'0');const m=Math.floor((durSec%3600)/60).toString().padStart(2,'0');const s=(durSec%60).toString().padStart(2,'0');return h+':'+m+':'+s;})();
  const receiptNo = rec.receiptNo || rec.id.slice(0,8);
  const receiptData = {
    shopName:printerSettings.shopName, shopTagline:printerSettings.shopTagline,
    shopAddress:printerSettings.shopAddress, shopPhone:printerSettings.shopPhone,
    receiptNo,
    date:new Date(rec.endTime).toLocaleDateString('en-PH'),
    time:new Date(rec.endTime).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}),
    seat:rec.seatName, customer:rec.user,
    duration:durStr,
    originalBill:rec.originalBill||rec.bill, discount:rec.discountAmount||0,
    total:rec.finalTotal||rec.bill, paymentType:rec.paymentTypeName,
    amountReceived:rec.amountReceived||0, change:rec.change||0,
    cashier:rec.handledBy||'Staff', footerNote:printerSettings.footerNote,
    wifiVoucher: rec.wifiVoucher || null,
  };
  if (isDialogMode()) {
    openPrintWindow(buildReceiptHTML(receiptData));
    addPrinterLog('Receipt opened for printing', 'success');
  } else if (window.printer?.isConnected) {
    try {
      await window.printer.printReceipt(receiptData);
    } catch(e) { addPrinterLog('Print failed: '+e.message,'error'); }
  }
}

async function printEndOfDayReport() {
  const now = new Date();
  const todayS = state.sessions.filter(s=>new Date(s.endTime).toDateString()===now.toDateString());
  if(todayS.length===0){alert('No sessions completed today yet!');return;}
  const totalRev = todayS.reduce((a,s)=>a+(s.finalTotal||s.bill),0);
  const totalHrsDec = todayS.reduce((a,s)=>a+s.elapsed,0);
  const totalDiscounts = todayS.reduce((a,s)=>a+(s.discountAmount||0),0);

  // Payment breakdown for report
  const payBreakMap = {};
  state.paymentTypes.forEach(pt=>{payBreakMap[pt.id]={name:pt.name,count:0,total:0};});
  todayS.forEach(s=>{if(s.paymentType&&payBreakMap[s.paymentType]){payBreakMap[s.paymentType].count++;payBreakMap[s.paymentType].total+=(s.finalTotal||s.bill);}});
  const payBreak = Object.values(payBreakMap).filter(p=>p.count>0);

  // Seat breakdown for report
  const seatBreakMap = {};
  todayS.forEach(s=>{
    if(!seatBreakMap[s.seatName]) seatBreakMap[s.seatName]={name:s.seatName,sessions:0,revenue:0};
    seatBreakMap[s.seatName].sessions++;
    seatBreakMap[s.seatName].revenue+=(s.finalTotal||s.bill);
  });
  const seatBreak = Object.values(seatBreakMap).sort((a,b)=>b.revenue-a.revenue);

  const eodData = {
    shopName:printerSettings.shopName,
    date:now.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}),
    time:now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}),
    totalSessions:todayS.length,
    totalHoursHHMM: fmtHHMM(totalHrsDec),
    totalRevenue:totalRev,
    totalDiscounts,
    payBreak,
    seatBreak,
    cashier:state.currentUser?.name||'Staff'
  };
  if (isDialogMode()) {
    openPrintWindow(buildEODHTML(eodData));
    addPrinterLog('EOD Report opened for printing', 'success');
  } else if (window.printer?.isConnected) {
    try { await window.printer.printEOD(eodData); showToast('EOD Report Printed!'); }
    catch(e) { alert('Print failed: '+e.message); }
  } else {
    alert('No printer connected. For Windows, select "Windows Print Dialog" method.');
  }
}

// ── Storage helpers ───────────────────────────────────────────────────────────
function getVoucherPools() {
  return DB.get('sh_voucher_pools', []);
}
function saveVoucherPools(pools) {
  DB.set('sh_voucher_pools', pools);
  if(window.FirebaseDB?.configured) {
    pools.forEach(p => window.FirebaseDB.set('voucher_pools', p.seatType.replace(/\s+/g,'_'), p));
  }
}
function getVoucherPool(seatType) {
  return getVoucherPools().find(p => p.seatType === seatType) || null;
}

// ── Auto-assign voucher from pool ─────────────────────────────────────────────
function assignVoucherFromPool(seatType, limitMs) {
  const pools = getVoucherPools();
  const poolIdx = pools.findIndex(p => p.seatType === seatType);
  if(poolIdx === -1) return null;
  const pool = pools[poolIdx];
  const availIdx = pool.vouchers.findIndex(v => v.status === 'available');
  if(availIdx === -1) return null;
  const voucher = pool.vouchers[availIdx];
  pools[poolIdx].vouchers[availIdx] = {
    ...voucher,
    status: 'in-use',
    assignedAt: Date.now(),
    limitMs: limitMs || null,
  };
  saveVoucherPools(pools);
  updateVoucherBadge();
  return voucher.code;
}

// ── Mark voucher as used when session ends ────────────────────────────────────
function markVoucherUsed(seatType, code) {
  if(!code) return;
  const pools = getVoucherPools();
  const poolIdx = pools.findIndex(p => p.seatType === seatType);
  if(poolIdx === -1) return;
  const vIdx = pools[poolIdx].vouchers.findIndex(v => v.code === code);
  if(vIdx === -1) return;
  pools[poolIdx].vouchers[vIdx] = {
    ...pools[poolIdx].vouchers[vIdx],
    status: 'used',
    usedAt: Date.now(),
  };
  saveVoucherPools(pools);
}

// Hook into session end to mark voucher used
const _origProcessPayment = processPayment;
// We patch after save — voucher is marked used after processPayment completes
// We do this by wrapping the save() call context — instead we call markVoucherUsed
// inside processPayment directly (see updated processPayment above via wifiVoucher on record)
// So we listen for new sessions being added to mark the voucher used:
function onSessionSaved(rec) {
  if(rec.wifiVoucher && rec.seatType) {
    markVoucherUsed(rec.seatType, rec.wifiVoucher);
  }
}

  closeDrawer();
  setTimeout(()=>{

      </div>

      </div>

      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary btn-full" onclick="doImportVouchers('${seatType}')">✅ Import Codes</button>
        <button class="btn btn-secondary btn-full" onclick="closeDrawer()">Cancel</button>
      </div>
    `);
    // Live preview counter
    setTimeout(()=>{
      const ta = document.getElementById('vi-codes');
      if(ta) ta.addEventListener('input', ()=>{
        const codes = ta.value.split('\n').map(c=>c.trim().toUpperCase()).filter(c=>c.length>0);
        const preview = document.getElementById('vi-preview');
        if(preview) preview.textContent = codes.length > 0 ? `${codes.length} code(s) ready to import` : '';
      });
    }, 300);
  }, 200);
}

function doImportVouchers(seatType) {
  const ta = document.getElementById('vi-codes');
  if(!ta) return;
  const raw = ta.value.split('\n').map(c=>c.trim().toUpperCase()).filter(c=>c.length>0);
  if(raw.length === 0) { alert('Please paste at least one voucher code.'); return; }

  const pools = getVoucherPools();
  let poolIdx = pools.findIndex(p=>p.seatType===seatType);
  if(poolIdx === -1) {
    pools.push({ seatType, vouchers: [] });
    poolIdx = pools.length - 1;
  }

  // Deduplicate: skip already existing codes
  const existingCodes = new Set(pools[poolIdx].vouchers.map(v=>v.code));
  const newCodes = raw.filter(c=>!existingCodes.has(c));
  const dupes = raw.length - newCodes.length;

  newCodes.forEach(code => {
    pools[poolIdx].vouchers.push({ code, status:'available', importedAt: Date.now() });
  });

  saveVoucherPools(pools);
  updateVoucherBadge();
  closeDrawer();
  showToast(`✅ Imported ${newCodes.length} voucher(s)${dupes>0?` (${dupes} duplicates skipped)`:''}`);
  renderVouchersScreen();
}

function clearUsedVouchers(seatType) {
  if(!confirm(`Remove all USED vouchers from the "${seatType}" pool? Available vouchers will remain.`)) return;
  const pools = getVoucherPools();
  const idx = pools.findIndex(p=>p.seatType===seatType);
  if(idx === -1) return;
  const before = pools[idx].vouchers.length;
  pools[idx].vouchers = pools[idx].vouchers.filter(v=>v.status!=='used');
  const removed = before - pools[idx].vouchers.length;
  saveVoucherPools(pools);
  showToast(`🗑 Removed ${removed} used voucher(s)`);
  renderVouchersScreen();
}

    <div class="code-val">${voucherCode}</div>
  </div>
</div>
<div class="divider"></div>
<div class="center section" style="font-size:${fs-2}pt;">
  <div><b>How to connect:</b></div>
  <div>1. Connect to WiFi: <b>${ssid}</b></div>
  <div>2. Open browser</div>
  <div>3. Enter code: <b>${voucherCode}</b></div>
</div>
<div class="divider-solid"></div>
<div class="center section" style="font-size:${fs-2}pt;">${note}</div>
<script>window.onload=()=>{window.print();window.onafterprint=()=>window.close();}<\/script>
</body></html>`;
}

function printWifiSlip(rec) {
  if(!rec.wifiVoucher) { showToast('No voucher attached to this session'); return; }
  const dur = fmtTime(Math.round(rec.elapsed*3600));
  const html = buildWifiSlipHTML(rec.seatName, rec.wifiVoucher, dur);
  openPrintWindow(html);
  addPrinterLog('WiFi slip opened for printing', 'success');
}

function printWifiSlipDirect(seatName, voucherCode, duration) {
  const html = buildWifiSlipHTML(seatName, voucherCode, duration);
  openPrintWindow(html);
  addPrinterLog('WiFi slip opened for printing', 'success');
}

// ── Patch processPayment to mark voucher used on checkout ─────────────────────
// We hook into the existing save flow by overriding the sessions push
const _origSessionPush = Array.prototype.push;
// Instead, we call markVoucherUsed right after record is created in processPayment.
// This is done by patching the state.sessions assignment in processPayment.
// Since we already updated processPayment to save rec.wifiVoucher,
// we call markVoucherUsed when we push the session:
function pushSessionAndMarkVoucher(record) {
  state.sessions = [record, ...state.sessions];
  if(record.wifiVoucher && record.seatType) {
    markVoucherUsed(record.seatType, record.wifiVoucher);
  }
  AlertEngine.clearSeat(record.seatId);
}

// ─── PWA Install ──────────────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});
window.addEventListener('appinstalled', () => { document.getElementById('install-banner').style.display = 'none'; });

// ─── Service Worker ───────────────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ─── Init ─────────────────────────────────────────────────────────────────────
initPrinterEngine();
updateVoucherBadge();
renderDashboard();
</script>
